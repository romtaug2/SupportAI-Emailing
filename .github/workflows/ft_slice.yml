# ═══════════════════════════════════════════════════════════════
#  SupportAI — Tranche quotidienne FRANCE TRAVAIL (Playwright)
#  1 département par run, borné (~15-25 min), isolé du pipeline
#  quotidien qui envoie les emails (celui-ci ne fait QUE récolter).
#   - scrape_slice_ft.py : 1 dept via curseur data/ft_cursor.json
#   - commit : france_travail.db + exports/france_travail/ + curseur
#  Les nouveaux emails sont intégrés au master par build_master.py
#  lors du run suivant du pipeline quotidien (il lit exports/).
#
#  Lancé à 03:00 UTC : bien avant le pipeline emails (05:50 UTC),
#  aucun chevauchement de push sur main.
# ═══════════════════════════════════════════════════════════════

name: "🔪 SupportAI Slice France Travail"

on:
  schedule:
    - cron: "0 3 * * 1-6"   # Lun-Sam 03:00 UTC
  workflow_dispatch:
    inputs:
      ft_max_pages:
        description: "Pages listing max / département (défaut 12)"
        required: false
        default: "12"
      ft_enrich:
        description: "Enrichir les emails via les sites ?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

concurrency:
  group: supportai-ft-slice
  cancel-in-progress: false

jobs:
  ft_slice:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # marge large : un run borné à 12 pages dure ~15-25 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer Chromium pour Playwright
        run: python -m playwright install --with-deps chromium

      - name: Récolte — tranche france_travail (1 département)
        env:
          FT_MAX_PAGES: ${{ github.event.inputs.ft_max_pages || '12' }}
          FT_ENRICH: ${{ github.event.inputs.ft_enrich || 'true' }}
        run: python scrape_slice_ft.py

      - name: Committer base + exports + curseur
        if: always()   # sauve ce qui a été écrit même si le run est coupé
        run: |
          git config user.name  "SupportAI Bot"
          git config user.email "bot@supportai.fr"
          git add data/france_travail.db data/ft_cursor.json \
                  exports/france_travail/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ Rien à committer"
            exit 0
          fi

          git commit -m "🔪 Slice france_travail $(date -u +%Y-%m-%d)"

          for i in 1 2 3; do
            git push origin main && exit 0
            echo "⚠️ Push rejeté, rebase..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((RANDOM % 10 + 3))
          done
          exit 1
